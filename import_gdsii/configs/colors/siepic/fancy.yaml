name: Fancy
description: Fancy color scheme - vivid flat aesthetic
layers:
  # Silicon — pink/magenta (matches SiEPIC KLayout default)
  Si:
    color: [1.00, 0.50, 0.66, 1.0]
    metallic: 0.0
    roughness: 1.0
  SiRib90:
    color: [0.50, 0.66, 1.00, 1.0]
    metallic: 0.0
    roughness: 1.0
  SiLitho193:
    color: [0.80, 0.50, 0.66, 1.0]
    metallic: 0.0
    roughness: 1.0

  # SiN — light blue
  SiN:
    color: [0.65, 0.81, 0.89, 0.95]
    metallic: 0.0
    roughness: 1.0

  # Doping — vivid violet / blue
  SiNdope:
    color: [0.44, 0.00, 1.00, 0.95]
    metallic: 0.0
    roughness: 1.0
  SiNppdope:
    color: [0.10, 0.20, 1.00, 0.95]
    metallic: 0.0
    roughness: 1.0

  # Oxide open — orange
  OxideOpen:
    color: [1.00, 0.68, 0.00, 0.6]
    metallic: 0.0
    roughness: 1.0

  # M1 heater — gold/yellow
  M1Heater:
    color: [0.92, 0.78, 0.20, 1.0]
    metallic: 0.0
    roughness: 1.0

  # VC — deep purple
  VC:
    color: [0.23, 0.01, 0.50, 1.0]
    metallic: 0.0
    roughness: 1.0

  # M2 — vivid blue
  M2Router:
    color: [0.20, 0.44, 0.92, 1.0]
    metallic: 0.0
    roughness: 1.0

  # Metal opening — black
  MOpen:
    color: [0.00, 0.00, 0.00, 1.0]
    metallic: 0.0
    roughness: 1.0

  # Etches — silvery / pale green
  DeepTrench:
    color: [0.75, 0.75, 0.75, 1.0]
    metallic: 0.0
    roughness: 1.0
  IsolationTrench:
    color: [0.75, 0.75, 0.75, 1.0]
    metallic: 0.0
    roughness: 1.0
  ShelfEtch:
    color: [0.75, 0.88, 0.75, 1.0]
    metallic: 0.0
    roughness: 1.0
